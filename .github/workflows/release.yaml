name: Run release

on:
  workflow_dispatch: {}

# env:
permissions:
  contents: write

jobs:
  # =================================================================
  # STEP 1: Check version
  # =================================================================
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Run get version
        run: |
          source ./build/run.sh version
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Check version exists
        run: |
          git fetch --tags
          TAG="v${VERSION}"

          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag already exists"
            exit 1
          fi

  # =================================================================
  # STEP 2: Run tests
  # =================================================================
  test:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # =================================================================
  # STEP 3: Build binary for multi platform
  # =================================================================
  build_release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Make run.sh executable
        run: chmod +x ./build/run.sh

      - name: Run release script
        run: |
          cd build
          source ./run.sh build
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.VERSION }}"
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.VERSION }}"
          files: build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
